<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9566F2"/>
      <stop offset="100%" stop-color="#1F74EC"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg-grad)"/>

  <!-- Subtle grid lines (management/data feel) -->
  <line x1="100" y1="380" x2="412" y2="380" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>
  <line x1="100" y1="320" x2="412" y2="320" stroke="white" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="100" y1="260" x2="412" y2="260" stroke="white" stroke-width="1" stroke-opacity="0.06"/>

  <!-- Rising bar chart behind the person (growth/performance) -->
  <rect x="90" y="330" width="42" height="50" rx="6" fill="white" fill-opacity="0.12"/>
  <rect x="146" y="300" width="42" height="80" rx="6" fill="white" fill-opacity="0.15"/>
  <rect x="202" y="265" width="42" height="115" rx="6" fill="white" fill-opacity="0.18"/>

  <!-- Ascending trend line -->
  <polyline
    points="111,335 167,302 223,268 340,200"
    fill="none"
    stroke="white"
    stroke-width="3"
    stroke-opacity="0.35"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrow tip on trend -->
  <polygon points="348,195 335,208 330,194" fill="white" fill-opacity="0.4"/>

  <!-- Person silhouette (the "Gerente") — right side, prominent -->
  <!-- Head -->
  <circle cx="340" cy="185" r="42" fill="white" fill-opacity="0.95"/>
  <!-- Body / Torso (suit shape) -->
  <path
    d="M 340 227
       C 300 227 272 255 268 295
       L 268 400
       L 412 400
       L 412 295
       C 408 255 380 227 340 227 Z"
    fill="white"
    fill-opacity="0.9"
  />
  <!-- Tie (professional touch) -->
  <path
    d="M 333 227 L 340 260 L 347 227"
    fill="url(#bg-grad)"
    opacity="0.7"
  />
  <!-- Collar lines -->
  <line x1="340" y1="227" x2="318" y2="250" stroke="url(#bg-grad)" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="340" y1="227" x2="362" y2="250" stroke="url(#bg-grad)" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
</svg>
